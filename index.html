<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- %BASE_URL% so icons resolve under the GitHub Pages sub-path (base "/image-converter/"). -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%pwa-192x192.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%pwa-192x192.png" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e2e7ef" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#101417" />

    <title>Free Image to SVG Vectorizer — in your browser | Halftone</title>
    <meta
      name="description"
      content="Vectorize PNG, JPG & WebP to a clean SVG, right in your browser. Free, no ads, no upload, no sign-up — simple, with full control over colors and detail."
    />
    <link rel="canonical" href="https://nuncaeslupus.github.io/image-converter/" />

    <!-- One indexable URL per language; reciprocal + x-default so Google serves
         the right one. Keep in sync with es/index.html. -->
    <link rel="alternate" hreflang="en" href="https://nuncaeslupus.github.io/image-converter/" />
    <link rel="alternate" hreflang="es" href="https://nuncaeslupus.github.io/image-converter/es/" />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://nuncaeslupus.github.io/image-converter/"
    />

    <!-- Open Graph / Twitter. Absolute URLs (crawlers don't resolve relative). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Halftone" />
    <meta property="og:title" content="Free Image to SVG Vectorizer — in your browser | Halftone" />
    <meta
      property="og:description"
      content="Vectorize PNG, JPG & WebP to a clean SVG, right in your browser. Free, no ads, no upload, no sign-up — simple, with full control."
    />
    <meta property="og:url" content="https://nuncaeslupus.github.io/image-converter/" />
    <meta
      property="og:image"
      content="https://nuncaeslupus.github.io/image-converter/og/og-en.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Halftone — free image to SVG vectorizer, right in your browser"
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Static structured data, seen before the app mounts. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Halftone",
        "url": "https://nuncaeslupus.github.io/image-converter/",
        "description": "Free, private image-to-SVG vectorizer that runs entirely in your browser. Convert PNG, JPG, WebP, GIF, BMP and AVIF to clean SVG with full control over colors and detail — no ads, no upload, no sign-up.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (modern web browser)",
        "browserRequirements": "Requires a modern browser with WebAssembly",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "featureList": [
          "Convert PNG, JPG, WebP, GIF, BMP and AVIF to SVG",
          "Runs entirely in the browser — images never leave your device",
          "Adjustable color palette, smoothness, detail and contrast",
          "Crop and rotate before tracing",
          "No ads, no sign-up, no watermark"
        ],
        "inLanguage": ["en", "es"]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
