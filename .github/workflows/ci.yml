name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# npm ci executes arbitrary lifecycle scripts from dependencies; keep the
# default GITHUB_TOKEN read-only so a compromised package cannot push or
# tamper with the repo.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:build
